<!-- index.html (Zielkarte v1) — FIX: lädt children per ID (n_base64url(name)) + Migration von legacy name-keys -->
<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zielkarte</title>

  <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;600;800;900&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#f7f8fc; --card:#ffffff; --txt:#111827; --muted:#6b7280;
      --border:#e5e7eb; --radius:18px; --shadow:0 6px 18px rgba(0,0,0,.08);
      --green:#22c55e;
      --red:#ef4444;
      --blue:#007aff;
    }
    *{box-sizing:border-box}
    body{
      margin:0; padding:14px; background:var(--bg); color:var(--txt);
      font-family:'SF Pro Display',system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      min-height:100vh; display:flex; justify-content:center;
    }
    .wrap{width:100%; max-width:760px}
    h1{text-align:center; font-size:26px; font-weight:900; margin:8px 0 14px}

    .card{
      background:var(--card); border:1px solid var(--border); border-radius:var(--radius);
      box-shadow:var(--shadow); padding:14px; margin-bottom:14px;
    }
    .hidden{display:none}
    .search{
      width:100%; padding:14px; border-radius:14px; border:1px solid var(--border);
      font-size:16px; margin-bottom:12px;
    }
    .kidList{display:flex; flex-direction:column; gap:12px}
    .kidBtn{
      padding:16px;
      border-radius:18px;
      border:1px solid var(--border);
      background:#fff;
      cursor:pointer;
      display:flex;
      justify-content:space-between;
      align-items:center;
      font-size:20px;
      font-weight:900;
    }
    .kidBtn:active{transform:scale(.99)}
    .kidArrow{font-size:14px; color:var(--muted); font-weight:900}

    .toolbar{display:flex; align-items:center; gap:10px; margin-bottom:6px}
    .back{
      border:1px solid var(--border); background:#fff; border-radius:14px;
      padding:10px 14px; font-weight:900; cursor:pointer;
    }

    .mouse{width:46px; height:46px; display:block; margin:8px auto 0}
    .kidName{font-size:20px; font-weight:900; text-align:center; margin-top:6px}
    .goalText{font-size:18px; font-weight:900; text-align:center; margin-top:10px; line-height:1.25}
    .stampLine{margin-top:10px; font-size:13px; color:var(--muted); font-weight:800; text-align:center}

    .circles{
      display:grid;
      grid-template-columns:repeat(10,1fr);
      gap:8px;
      margin-top:12px;
    }
    .dot{
      aspect-ratio:1/1;
      border-radius:999px;
      border:2px solid var(--border);
      background:#fff;
    }
    .dot.on{
      background:var(--green);
      border-color:var(--green);
    }

    .empty{
      text-align:center;
      font-size:13px;
      color:var(--muted);
      font-weight:800;
      padding:20px 0;
    }
    .warn{
      background:#fff7ed;
      border:1px solid #fed7aa;
      border-radius:14px;
      padding:10px;
      color:#9a3412;
      font-size:12px;
      font-weight:800;
      margin-top:10px;
    }

    /* PIN Overlay */
    .overlay{
      position:fixed; inset:0; background:rgba(0,0,0,.45);
      display:none; align-items:flex-end; justify-content:center; padding:10px;
      z-index:9999;
    }
    .overlay.show{display:flex}
    .panel{
      width:100%; max-width:520px; background:#fff; border-radius:20px;
      border:1px solid var(--border); box-shadow:0 24px 60px rgba(0,0,0,.28);
      padding:14px;
    }
    .panelTitle{font-weight:950; font-size:18px}
    .panelSub{color:var(--muted); font-size:12px; font-weight:800; margin-top:2px}
    .pinInput{
      width:100%;
      padding:14px;
      border-radius:14px;
      border:1px solid var(--border);
      font-size:18px;
      font-weight:900;
      margin-top:10px;
    }
    .row{display:flex; gap:10px; align-items:center; margin-top:10px}
    .btn{
      flex:1;
      border:1px solid var(--border);
      background:#fff;
      border-radius:14px;
      padding:12px 14px;
      font-weight:900;
      cursor:pointer;
    }
    .btn.primary{background:var(--blue); border-color:var(--blue); color:#fff}
    .err{color:var(--red); font-weight:900; font-size:12px; margin-top:8px}
    .lockedBox{
      background:#ffecec;
      border:1px solid var(--red);
      color:#7a0000;
      border-radius:14px;
      padding:10px;
      margin-top:10px;
      font-weight:900;
      font-size:12px;
      white-space:pre-wrap;
    }
    .debug{
      margin-top:10px;
      background:#0b1220;
      color:#e5e7eb;
      border-radius:14px;
      padding:10px;
      font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;
      font-size:12px;
      white-space:pre-wrap;
      overflow:auto;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <h1>Zielkarte</h1>

    <!-- LIST VIEW -->
    <div id="listView" class="card">
      <input id="search" class="search" placeholder="Wähle deinen Namen …" />
      <div id="kidList" class="kidList"></div>
      <div id="noKids" class="empty hidden">Es sind noch keine Kinder vorhanden.</div>
      <div id="hint" class="warn hidden">Hinweis: Es werden nur Namen angezeigt, die in beiden Datenbanken existieren (Zugang + Zielkarte).</div>

      <div id="debug" class="debug">loading…</div>
    </div>

    <!-- DETAIL VIEW -->
    <div id="detailView" class="card hidden">
      <div class="toolbar">
        <button id="backBtn" class="back">← Zurück</button>
      </div>

      <svg class="mouse" viewBox="0 0 64 64" aria-hidden="true">
        <circle cx="20" cy="18" r="10" fill="#111827"/>
        <circle cx="44" cy="18" r="10" fill="#111827"/>
        <ellipse cx="32" cy="36" rx="18" ry="16" fill="#111827"/>
        <circle cx="26" cy="34" r="3" fill="#fff"/>
        <circle cx="38" cy="34" r="3" fill="#fff"/>
        <circle cx="26" cy="34" r="1.5" fill="#111827"/>
        <circle cx="38" cy="34" r="1.5" fill="#111827"/>
        <ellipse cx="32" cy="42" rx="6" ry="4" fill="#fff"/>
      </svg>

      <div id="kidName" class="kidName">—</div>
      <div id="goalText" class="goalText">—</div>
      <div id="stampLine" class="stampLine">—</div>
      <div id="circles" class="circles"></div>

      <div id="noCatalogWarn" class="warn hidden">
        Zielkatalog nicht gefunden. Bitte prüfen: <b>/zielkarte/v1/catalog</b> in der Punkte-Firebase.
      </div>
    </div>
  </div>

  <!-- PIN Overlay -->
  <div id="pinOverlay" class="overlay" aria-hidden="true">
    <div class="panel">
      <div class="panelTitle" id="pinTitle">PIN eingeben</div>
      <div class="panelSub" id="pinSub">—</div>

      <input id="pinInput" class="pinInput" type="number" inputmode="numeric" placeholder="PIN" />

      <div id="pinLockedBox" class="lockedBox hidden"></div>
      <div id="pinError" class="err hidden">Falsche PIN.</div>

      <div class="row">
        <button id="pinCancel" class="btn">Abbrechen</button>
        <button id="pinOk" class="btn primary">OK</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.5.2/firebase-app.js";
    import { getDatabase, ref, get, onValue, set } from "https://www.gstatic.com/firebasejs/10.5.2/firebase-database.js";

    /* ===== Firebase 1: gesamt-dae4e (Zugang / PIN / Sperre) ===== */
    const configAccess = {
      apiKey:"AIzaSyAQaNKUa-RKvUcwlPpWnEyKxcVjYV6cZuU",
      authDomain:"gesamt-dae4e.firebaseapp.com",
      databaseURL:"https://gesamt-dae4e-default-rtdb.europe-west1.firebasedatabase.app",
      projectId:"gesamt-dae4e",
      storageBucket:"gesamt-dae4e.appspot.com",
      messagingSenderId:"844023612743",
      appId:"1:844023612743:web:0821aa894541f89a7df862"
    };

    /* ===== Firebase 2: punkte-45c20 (Zielkarte / Katalog / Stempel) ===== */
    const configPoints = {
      apiKey: "AIzaSyAdPN2duh89Fx5rmYlFshdf0juhYNX_7fg",
      authDomain: "punkte-45c20.firebaseapp.com",
      databaseURL: "https://punkte-45c20-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "punkte-45c20",
      storageBucket: "punkte-45c20.appspot.com",
      messagingSenderId: "931713539549",
      appId: "1:931713539549:web:e348bf38369639f1906a34"
    };

    const appAccess = initializeApp(configAccess, "accessApp");
    const dbAccess = getDatabase(appAccess);

    const appPoints = initializeApp(configPoints, "pointsApp");
    const dbPoints = getDatabase(appPoints);

    /* ===== Pfade ===== */
    const PATH_NAMES_OLD   = "kinder";                 // (dbPoints) nur Keys
    const PATH_ACCESS_KIDS = "kinder";                 // (dbAccess) code/gesperrt/sperrGrund
    const PATH_CATALOG     = "zielkarte/v1/catalog";   // (dbPoints)
    const PATH_CHILDREN    = "zielkarte/v1/children";  // (dbPoints) children/{id}

    /* ===== DOM ===== */
    const listView = document.getElementById("listView");
    const detailView = document.getElementById("detailView");
    const searchEl = document.getElementById("search");
    const kidListEl = document.getElementById("kidList");
    const noKidsEl = document.getElementById("noKids");
    const hintEl = document.getElementById("hint");
    const debugEl = document.getElementById("debug");

    const backBtn = document.getElementById("backBtn");
    const kidNameEl = document.getElementById("kidName");
    const goalTextEl = document.getElementById("goalText");
    const stampLineEl = document.getElementById("stampLine");
    const circlesEl = document.getElementById("circles");
    const noCatalogWarn = document.getElementById("noCatalogWarn");

    const pinOverlay = document.getElementById("pinOverlay");
    const pinTitle = document.getElementById("pinTitle");
    const pinSub = document.getElementById("pinSub");
    const pinInput = document.getElementById("pinInput");
    const pinOk = document.getElementById("pinOk");
    const pinCancel = document.getElementById("pinCancel");
    const pinError = document.getElementById("pinError");
    const pinLockedBox = document.getElementById("pinLockedBox");

    /* ===== State ===== */
    let namesPoints = [];  // dbPoints/kinder keys (gefiltert)
    let accessKids  = {};  // dbAccess/kinder map
    let catalog     = null;
    let statesById  = {};  // id -> state

    let pendingName = null;

    /* ===== Utils ===== */
    const clampStamps = (x) => Math.max(0, Math.min(10, Math.floor(Number(x) || 0)));

    function isValidName(name){
      const n = String(name || "").trim();
      if(!n) return false;
      if(n.includes("~")) return false;
      if(n.length < 2) return false;
      return true;
    }

    // EXACT gleiche ID-Logik wie im Admin
    function toBase64Url(str){
      const utf8 = new TextEncoder().encode(str);
      let bin = "";
      utf8.forEach(b => bin += String.fromCharCode(b));
      const b64 = btoa(bin);
      return b64.replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/g, "");
    }
    function idForName(name){
      return "n_" + toBase64Url(String(name || "").trim());
    }

    function toggle(showList){
      listView.classList.toggle("hidden", !showList);
      detailView.classList.toggle("hidden", showList);
    }

    function showPin(){
      pinOverlay.classList.add("show");
      pinOverlay.setAttribute("aria-hidden","false");
      pinInput.value = "";
      pinError.classList.add("hidden");
      pinLockedBox.classList.add("hidden");
      setTimeout(()=>pinInput.focus(), 50);
    }
    function hidePin(){
      pinOverlay.classList.remove("show");
      pinOverlay.setAttribute("aria-hidden","true");
      pendingName = null;
    }

    pinOverlay.addEventListener("click", (e)=>{ if(e.target === pinOverlay) hidePin(); });
    pinCancel.addEventListener("click", hidePin);
    backBtn.addEventListener("click", ()=>toggle(true));

    function getGoalById(id){
      if(!catalog?.goals?.length) return null;
      return catalog.goals.find(g => g.id === id) || null;
    }
    function firstGoalId(){
      return catalog?.goals?.[0]?.id || null;
    }

    function renderCircles(stamps){
      circlesEl.innerHTML = "";
      for(let i=1;i<=10;i++){
        const d = document.createElement("div");
        d.className = "dot" + (i <= stamps ? " on" : "");
        circlesEl.appendChild(d);
      }
    }

    function renderDebug(){
      const merged = namesPoints.filter(n => accessKids[n] != null);
      debugEl.textContent =
        `sync: ${catalog ? "catalog✓" : "catalog×"}  ${Object.keys(statesById).length ? "children✓" : "children×"}  access:${Object.keys(accessKids).length}\n` +
        `namesPoints: ${namesPoints.length} | merged(access+points): ${merged.length}\n` +
        `children path: /${PATH_CHILDREN} (id: n_base64url(name))`;
    }

    /* ===== Liste: nur Namen ===== */
    function renderList(){
      const q = (searchEl.value || "").toLowerCase();
      const merged = namesPoints.filter(n => accessKids[n] != null);

      hintEl.classList.toggle("hidden", merged.length === namesPoints.length);

      const filtered = merged
        .filter(n => n.toLowerCase().includes(q))
        .sort((a,b)=>a.localeCompare(b,'de'));

      kidListEl.innerHTML = "";

      if(filtered.length === 0){
        noKidsEl.classList.toggle("hidden", merged.length !== 0);
        if(merged.length !== 0){
          const div = document.createElement("div");
          div.className = "empty";
          div.textContent = "Keine Treffer.";
          kidListEl.appendChild(div);
        }
        renderDebug();
        return;
      }
      noKidsEl.classList.add("hidden");

      for(const name of filtered){
        const btn = document.createElement("div");
        btn.className = "kidBtn";
        btn.innerHTML = `<div>${name}</div><div class="kidArrow">›</div>`;
        btn.addEventListener("click", ()=>startPinFlow(name));
        kidListEl.appendChild(btn);
      }
      renderDebug();
    }
    searchEl.addEventListener("input", renderList);

    async function startPinFlow(name){
      pendingName = name;
      pinTitle.textContent = "PIN eingeben";
      pinSub.textContent = name;

      showPin();

      const acc = accessKids[name];
      if(acc && acc.gesperrt === true){
        pinLockedBox.textContent = `Dein Konto wurde vorübergehend gesperrt.\n\nGrund: ${acc.sperrGrund || "Kein Grund angegeben."}`;
        pinLockedBox.classList.remove("hidden");
        pinOk.disabled = true;
        pinInput.disabled = true;
      } else {
        pinOk.disabled = false;
        pinInput.disabled = false;
      }
    }

    async function pinOkHandler(){
      if(!pendingName) return;

      const name = pendingName; // wichtig: lokal sichern
      const acc = accessKids[name];
      if(acc && acc.gesperrt === true) return;

      const entered = String(pinInput.value || "").trim();
      if(!entered){
        pinError.textContent = "Bitte PIN eingeben.";
        pinError.classList.remove("hidden");
        return;
      }

      const real = String(acc?.code ?? "").trim();

      if(real && entered === real){
        pinError.classList.add("hidden");
        hidePin();
        await openDetail(name);
      } else {
        pinError.textContent = "Falsche PIN.";
        pinError.classList.remove("hidden");
        pinInput.select();
        pinInput.focus();
      }
    }
    pinOk.addEventListener("click", pinOkHandler);
    pinInput.addEventListener("keydown", (e)=>{ if(e.key === "Enter") pinOkHandler(); });

    // Migration: falls legacy unter /children/{NAME} existiert -> nach /children/{ID} kopieren
    async function migrateLegacyIfNeeded(name){
      const id = idForName(name);
      if(statesById[id]) return;

      const legacySnap = await get(ref(dbPoints, `${PATH_CHILDREN}/${name}`));
      if(!legacySnap.exists()) return;

      const legacy = legacySnap.val() || {};
      const migrated = {
        displayName: legacy.displayName || name,
        activeGoalId: legacy.activeGoalId || firstGoalId(),
        stamps: clampStamps(legacy.stamps ?? 0),
        noteText: legacy.noteText || "",
        noteWeek: legacy.noteWeek || ""
      };

      await set(ref(dbPoints, `${PATH_CHILDREN}/${id}`), migrated);
      // optional: legacy löschen:
      // await set(ref(dbPoints, `${PATH_CHILDREN}/${name}`), null);

      statesById[id] = migrated;
    }

    async function ensureChildStateExists(name){
      const id = idForName(name);
      if(statesById[id]) return { id, st: statesById[id] };
      if(!catalog?.goals?.length) return { id, st: null };

      await migrateLegacyIfNeeded(name);
      if(statesById[id]) return { id, st: statesById[id] };

      const init = {
        displayName: name,
        activeGoalId: firstGoalId(),
        stamps: 0,
        noteText: "",
        noteWeek: ""
      };
      await set(ref(dbPoints, `${PATH_CHILDREN}/${id}`), init);
      statesById[id] = init;
      return { id, st: init };
    }

    async function openDetail(name){
      kidNameEl.textContent = name;

      if(!catalog?.goals?.length){
        noCatalogWarn.classList.remove("hidden");
        goalTextEl.textContent = "—";
        stampLineEl.textContent = "—";
        renderCircles(0);
        toggle(false);
        return;
      }
      noCatalogWarn.classList.add("hidden");

      const ensured = await ensureChildStateExists(name);
      const st = ensured.st;

      const stamps = clampStamps(st?.stamps ?? 0);
      const remaining = Math.max(0, 10 - stamps);

      const goal = st?.activeGoalId ? getGoalById(st.activeGoalId) : null;
      goalTextEl.textContent = goal?.text || "—";
      stampLineEl.textContent = `Du hast ${stamps} Stempel. Es fehlen noch ${remaining}.`;

      renderCircles(stamps);
      toggle(false);
    }

    /* ===== Listener: dbPoints/kinder (Keys) ===== */
    onValue(ref(dbPoints, PATH_NAMES_OLD), (snap)=>{
      const arr = [];
      if(snap.exists()){
        snap.forEach(ch=>{
          const name = ch.key;
          if(isValidName(name)) arr.push(name);
        });
      }
      namesPoints = arr;
      renderList();
    });

    /* ===== Listener: dbAccess/kinder (Zugang) ===== */
    onValue(ref(dbAccess, PATH_ACCESS_KIDS), (snap)=>{
      const map = {};
      if(snap.exists()){
        snap.forEach(ch=>{
          const name = ch.key;
          if(isValidName(name)) map[name] = ch.val() || {};
        });
      }
      accessKids = map;
      renderList();

      if(pendingName && accessKids[pendingName]?.gesperrt === true){
        pinLockedBox.textContent = `Dein Konto wurde vorübergehend gesperrt.\n\nGrund: ${accessKids[pendingName]?.sperrGrund || "Kein Grund angegeben."}`;
        pinLockedBox.classList.remove("hidden");
        pinOk.disabled = true;
        pinInput.disabled = true;
      }
    });

    /* ===== Listener: Katalog ===== */
    onValue(ref(dbPoints, PATH_CATALOG), (snap)=>{
      catalog = snap.exists() ? snap.val() : null;
      renderList();
    });

    /* ===== Listener: Zielkarte-States children/{id} ===== */
    onValue(ref(dbPoints, PATH_CHILDREN), (snap)=>{
      const map = {};
      if(snap.exists()){
        snap.forEach(ch => map[ch.key] = ch.val() || {});
      }
      statesById = map;
      renderDebug();
      // Detail live aktualisieren wäre möglich, aber nicht notwendig
    });
  </script>
</body>
</html>
