<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Sapore - Kasse</title>
    <style>
        body { font-family: sans-serif; background: #f2f2f7; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .item { font-size: 14px; display: flex; justify-content: space-between; border-bottom: 1px solid #eee; padding: 4px 0; }
        .total { font-weight: bold; font-size: 18px; margin-top: 10px; text-align: right; color: #007aff; }
        .admin-box { margin-top: 50px; padding: 20px; background: #ffe5e5; border-radius: 12px; text-align: center; }
        .btn-danger { background: #ff3b30; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>💰 Kasse - Sapore</h1>
    <div id="revenue-total" style="font-size: 20px; margin-bottom: 20px;">Gesamterlös: 0 €</div>
    <div class="grid" id="bill-display"></div>

    <div class="admin-box">
        <h3>Adminbereich</h3>
        <button class="btn-danger" onclick="masterDelete()">Alle Bestellungen löschen</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAdPN2duh89Fx5rmYlFshdf0juhYNX_7fg",
            authDomain: "punkte-45c20.firebaseapp.com",
            databaseURL: "https://punkte-45c20-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "punkte-45c20",
            storageBucket: "punkte-45c20.appspot.com",
            messagingSenderId: "931713539549",
            appId: "1:931713539549:web:e348bf38369639f1906a34"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const ORDERS_PATH = "restaurant/sapore/orders";

        onValue(ref(db, ORDERS_PATH), (snapshot) => {
            const data = snapshot.val();
            const display = document.getElementById('bill-display');
            display.innerHTML = "";
            let totalRevenue = 0;

            if(!data) {
                document.getElementById('revenue-total').innerText = "Keine Umsätze vorhanden.";
                return;
            }

            const tables = {};
            Object.values(data).forEach(o => {
                if(!tables[o.table]) tables[o.table] = { items: [], sum: 0 };
                tables[o.table].items.push(o);
                tables[o.table].sum += o.price;
                totalRevenue += o.price;
            });

            Object.entries(tables).sort((a,b) => a[0] - b[0]).forEach(([num, data]) => {
                const card = document.createElement('div');
                card.className = "card";
                let itemsHtml = data.items.map(i => `<div class="item"><span>${i.itemName}</span><span>${i.price}€</span></div>`).join("");
                card.innerHTML = `<h3>Tisch ${num}</h3>${itemsHtml}<div class="total">${data.sum} €</div>`;
                display.appendChild(card);
            });
            document.getElementById('revenue-total').innerText = `Gesamterlös: ${totalRevenue} €`;
        });

        window.masterDelete = () => {
            const pin = prompt("Zum Löschen bitte PIN eingeben:");
            if(pin === "00") {
                if(confirm("Wirklich ALLE Bestellungen löschen? Das kann nicht rückgängig gemacht werden.")) {
                    remove(ref(db, ORDERS_PATH)).then(() => alert("Alle Bestellungen wurden gelöscht."));
                }
            } else {
                alert("Falsche PIN. Es wurde nichts gelöscht.");
            }
        };
    </script>
</body>
</html>
