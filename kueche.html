<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sapore Küche - Live Monitor</title>
    <style>
        :root {
            --bg: #000000;
            --card: #1c1c1e;
            --text: #ffffff;
            --sapore-yellow: #ffcc00; /* Knalliges Gelb */
            --sapore-green: #28cd41;  /* Knalliges Grün */
            --sapore-red: #ff3b30;    /* Knalliges Rot */
        }

        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 15px;
            -webkit-user-select: none;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 25px;
            background: var(--card);
            border-radius: 20px;
            margin-bottom: 20px;
            border: 1px solid #333;
        }

        .order-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--card);
            border-radius: 30px;
            padding: 30px;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            min-height: 320px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            border: 4px solid #333;
            transition: border-color 0.3s ease;
        }

        /* Der vollflächige Live-Hintergrund (Ladebildschirm-Effekt) */
        .progress-overlay {
            position: absolute;
            top: 0; left: 0; bottom: 0;
            width: 0%; 
            z-index: 1;
            transition: width 1s linear, background-color 0.5s ease;
            opacity: 0.8; /* Etwas Deckkraft, damit es knallt */
        }

        .card-content { position: relative; z-index: 2; height: 100%; display: flex; flex-direction: column; }

        .urgency-tag {
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 900;
            padding: 8px 16px;
            border-radius: 12px;
            display: inline-block;
            margin-bottom: 20px;
            background: rgba(0,0,0,0.5);
            width: fit-content;
        }

        .table-num { font-size: 65px; font-weight: 900; margin: 0; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        .item-name { font-size: 38px; font-weight: 800; margin: 10px 0; line-height: 1.1; flex-grow: 1; }
        
        .timer-area {
            font-size: 28px;
            font-weight: 700;
            background: rgba(0,0,0,0.3);
            padding: 10px 15px;
            border-radius: 15px;
            margin-bottom: 25px;
            display: inline-block;
        }

        .btn-done {
            width: 100%;
            padding: 25px;
            border: none;
            border-radius: 20px;
            font-size: 30px;
            font-weight: 900;
            cursor: pointer;
            background: #ffffff;
            color: #000;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        /* Farbausprägungen basierend auf deiner Logik */
        .state-too-early { border-color: var(--sapore-yellow); }
        .state-too-early .progress-overlay { background-color: var(--sapore-yellow); }
        .state-too-early .urgency-tag { color: var(--sapore-yellow); }

        .state-perfect { border-color: var(--sapore-green); }
        .state-perfect .progress-overlay { background-color: var(--sapore-green); }
        .state-perfect .urgency-tag { color: var(--sapore-green); }

        .state-late { border-color: var(--sapore-red); animation: border-pulse 1s infinite alternate; }
        .state-late .progress-overlay { background-color: var(--sapore-red); }
        .state-late .urgency-tag { color: #fff; background: var(--sapore-red); }

        @keyframes border-pulse {
            from { border-color: var(--sapore-red); box-shadow: 0 0 10px var(--sapore-red); }
            to { border-color: #ffffff; box-shadow: 0 0 30px var(--sapore-red); }
        }
    </style>
</head>
<body>

    <header>
        <div>
            <h1 style="margin:0; font-size: 26px; letter-spacing: 1px;">🍕 SAPORE KÜCHE</h1>
            <small id="last-sync" style="color: #666;">Synchronisiere...</small>
        </div>
        <div id="order-count" style="font-size: 24px; font-weight: 900; color: var(--sapore-green);">0 OFFEN</div>
    </header>

    <div class="order-grid" id="grid"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAdPN2duh89Fx5rmYlFshdf0juhYNX_7fg",
            authDomain: "punkte-45c20.firebaseapp.com",
            databaseURL: "https://punkte-45c20-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "punkte-45c20",
            storageBucket: "punkte-45c20.appspot.com",
            messagingSenderId: "931713539549",
            appId: "1:931713539549:web:e348bf38369639f1906a34"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const ORDERS_PATH = "restaurant/sapore/orders";

        let ordersData = {};

        // 1. Firebase Listeners: Nur Daten abrufen
        onValue(ref(db, ORDERS_PATH), (snapshot) => {
            ordersData = snapshot.val() || {};
            document.getElementById('last-sync').innerText = "Live verbunden: " + new Date().toLocaleTimeString();
            render(); 
        });

        // 2. Die Render-Funktion (baut die Karten)
        function render() {
            const grid = document.getElementById('grid');
            const openOrders = Object.entries(ordersData)
                .filter(([id, o]) => o.status === "open");

            // Sortierung: Älteste/Dringendste zuerst
            openOrders.sort((a, b) => a[1].createdAt - b[1].createdAt);

            document.getElementById('order-count').innerText = `${openOrders.length} OFFEN`;
            grid.innerHTML = "";

            openOrders.forEach(([id, o]) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.id = `card-${id}`;
                card.innerHTML = `
                    <div class="progress-overlay" id="prog-${id}"></div>
                    <div class="card-content">
                        <div class="urgency-tag" id="tag-${id}">Lädt...</div>
                        <div class="table-num">Tisch ${o.table}</div>
                        <div class="item-name">${o.itemName}</div>
                        <div class="timer-area" id="timer-${id}">00:00</div>
                        <button class="btn-done" onclick="markReady('${id}')">FERTIG ✓</button>
                    </div>
                `;
                grid.appendChild(card);
            });
            
            updateTimers(); // Sofort einmal Timer berechnen
        }

        // 3. Die Live-Funktion: Aktualisiert Sekunden & Farben OHNE die Seite neu zu bauen
        function updateTimers() {
            const openOrders = Object.entries(ordersData).filter(([id, o]) => o.status === "open");

            openOrders.forEach(([id, o]) => {
                const timerEl = document.getElementById(`timer-${id}`);
                const cardEl = document.getElementById(`card-${id}`);
                const progEl = document.getElementById(`prog-${id}`);
                const tagEl = document.getElementById(`tag-${id}`);

                if (!timerEl || !cardEl) return;

                const elapsedSec = (Date.now() - o.createdAt) / 1000;
                const elapsedMin = elapsedSec / 60;
                const ratio = elapsedMin / o.targetMinutes;

                // Timer Text (mm:ss)
                const m = Math.floor(elapsedSec / 60);
                const s = Math.floor(elapsedSec % 60);
                timerEl.innerText = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;

                // Breite des Ladebalkens (Hintergrund)
                const width = Math.min(ratio * 100, 100);
                progEl.style.width = width + "%";

                // --- DEINE FARB-LOGIK ---
                // Gelb: < 75% | Grün: 75% - 125% | Rot: > 125%
                cardEl.classList.remove('state-too-early', 'state-perfect', 'state-late');

                if (ratio > 1.25) {
                    cardEl.classList.add('state-late');
                    tagEl.innerText = "ZU SPÄT!";
                } else if (ratio >= 0.75) {
                    cardEl.classList.add('state-perfect');
                    tagEl.innerText = "JETZT SERVIEREN";
                } else {
                    cardEl.classList.add('state-too-early');
                    tagEl.innerText = "NOCH WARTEN...";
                }
            });
        }

        // Timer JEDE SEKUNDE laufen lassen
        setInterval(updateTimers, 1000);

        window.markReady = (id) => {
            update(ref(db, `${ORDERS_PATH}/${id}`), {
                status: "ready",
                readyAt: Date.now()
            });
        };

    </script>
</body>
</html>
