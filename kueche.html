<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sapore - Küche</title>
    <style>
        :root { --bg: #1c1c1e; --card: #2c2c2e; --text: #ffffff; --primary: #0a84ff; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
        .grid-orders { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .card { background: var(--card); border-radius: 15px; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); border-top: 8px solid #444; }
        .card.urgent-1 { border-top-color: #32d74b; } /* In Vorbereitung */
        .card.urgent-2 { border-top-color: #ffd60a; } /* Jetzt fertig machen */
        .card.urgent-3 { border-top-color: #ff9f0a; } /* Schnell fertig machen */
        .card.urgent-4 { border-top-color: #ff453a; animation: pulse 2s infinite; } /* Zu lange! */
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
        
        .table-num { font-size: 24px; font-weight: bold; margin-bottom: 5px; }
        .item-name { font-size: 20px; margin-bottom: 10px; color: var(--primary); }
        .meta { font-size: 14px; color: #aeaeb2; margin-bottom: 15px; }
        .btn-ready { width: 100%; padding: 15px; background: #32d74b; color: black; border: none; border-radius: 10px; font-weight: bold; font-size: 18px; cursor: pointer; }
        .status-txt { font-weight: bold; text-transform: uppercase; font-size: 12px; margin-bottom: 10px; display: block; }
    </style>
</head>
<body>
    <h1>👨‍🍳 Küche - Sapore</h1>
    <div id="kitchen-stats" style="margin-bottom: 20px; color: #aeaeb2;">Lade Bestellungen...</div>
    <div class="grid-orders" id="orders-display"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAdPN2duh89Fx5rmYlFshdf0juhYNX_7fg",
            authDomain: "punkte-45c20.firebaseapp.com",
            databaseURL: "https://punkte-45c20-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "punkte-45c20",
            storageBucket: "punkte-45c20.appspot.com",
            messagingSenderId: "931713539549",
            appId: "1:931713539549:web:e348bf38369639f1906a34"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const ORDERS_PATH = "restaurant/sapore/orders";

        function render() {
            onValue(ref(db, ORDERS_PATH), (snapshot) => {
                const data = snapshot.val();
                const display = document.getElementById('orders-display');
                display.innerHTML = "";
                
                if(!data) {
                    document.getElementById('kitchen-stats').innerText = "Keine offenen Bestellungen.";
                    return;
                }

                let orders = Object.entries(data)
                    .filter(([id, o]) => o.status === "open")
                    .map(([id, o]) => {
                        const elapsed = (Date.now() - o.createdAt) / 60000;
                        const ratio = elapsed / o.targetMinutes;
                        return { id, ...o, elapsed, ratio };
                    });

                // Sortierung: Dringlichkeit (Ratio) absteigend
                orders.sort((a, b) => b.ratio - a.ratio);
                document.getElementById('kitchen-stats').innerText = `${orders.length} Bestellungen offen`;

                orders.forEach(o => {
                    let statusLabel = "In Vorbereitung";
                    let urgentClass = "urgent-1";
                    if(o.ratio >= 2.0) { statusLabel = "Gast wartet zu lange!"; urgentClass = "urgent-4"; }
                    else if(o.ratio >= 1.5) { statusLabel = "Bitte schnell fertig machen"; urgentClass = "urgent-3"; }
                    else if(o.ratio >= 1.0) { statusLabel = "Jetzt fertig machen"; urgentClass = "urgent-2"; }

                    const card = document.createElement('div');
                    card.className = `card ${urgentClass}`;
                    card.innerHTML = `
                        <span class="status-txt">${statusLabel}</span>
                        <div class="table-num">Tisch ${o.table}</div>
                        <div class="item-name">${o.itemName}</div>
                        <div class="meta">Wartet seit: ${Math.floor(o.elapsed)} Min.<br>Ziel: ${o.targetMinutes} Min.</div>
                        <button class="btn-ready" onclick="markReady('${o.id}')">FERTIG</button>
                    `;
                    display.appendChild(card);
                });
            });
        }

        window.markReady = (id) => {
            update(ref(db, `${ORDERS_PATH}/${id}`), {
                status: "ready",
                readyAt: Date.now()
            });
        };

        setInterval(render, 30000); // Alle 30 Sek neu berechnen für Timer
        render();
    </script>
</body>
</html>
