<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Zielkarte – Admin</title>

  <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;600;800&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#f6f7fb; --card:#fff; --txt:#111827; --muted:#6b7280;
      --border:#e5e7eb; --accent:#007aff; --green:#22c55e;
      --radius:16px; --shadow:0 6px 18px rgba(0,0,0,.08);
    }
    *{box-sizing:border-box}
    body{
      margin:0; padding:14px; background:var(--bg); color:var(--txt);
      font-family:'SF Pro Display',system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
    }
    h1{margin:6px 0 14px;text-align:center;font-size:22px;font-weight:900;color:var(--accent)}
    .card{
      background:var(--card); border:1px solid var(--border);
      border-radius:var(--radius); box-shadow:var(--shadow);
      padding:12px; margin-bottom:12px;
    }
    .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
    .spacer{flex:1}
    .muted{color:var(--muted);font-size:12px;font-weight:700}
    .pill{
      padding:6px 10px;border:1px solid var(--border);
      border-radius:999px;background:#fafafa;
      font-size:12px;font-weight:900;
    }
    input,select,textarea{
      width:100%;padding:12px 14px;font-size:16px;
      border:1px solid var(--border);border-radius:14px;
    }
    textarea{min-height:90px}
    button{
      padding:12px 14px;border-radius:14px;
      border:1px solid var(--border);
      background:#fff;font-weight:900;cursor:pointer;
    }
    button.primary{background:var(--accent);border-color:var(--accent);color:#fff}
    .list{display:flex;flex-direction:column;gap:10px;margin-top:10px}
    .kid{
      border:1px solid var(--border);border-radius:16px;
      padding:12px;display:flex;justify-content:space-between;
      cursor:pointer;
    }
    .kidName{font-weight:900}
    .kidMeta{font-size:12px;color:var(--muted);font-weight:800}
    .overlay{
      position:fixed;inset:0;background:rgba(0,0,0,.35);
      display:none;align-items:flex-end;justify-content:center;
      padding:10px;
    }
    .overlay.show{display:flex}
    .panel{
      width:100%;max-width:720px;background:#fff;
      border-radius:20px;border:1px solid var(--border);
      padding:12px;
    }
    .circles{display:grid;grid-template-columns:repeat(10,1fr);gap:8px;margin-top:10px}
    .dot{
      aspect-ratio:1/1;border-radius:999px;
      border:2px solid var(--border);cursor:pointer;
    }
    .dot.on{background:var(--green);border-color:var(--green)}
  </style>
</head>

<body>
<h1>Zielkarte – Admin</h1>

<div class="card">
  <div class="row">
    <div>
      <b>Zielkatalog</b>
      <div class="muted">Pfad: <code>/zielkarte/v1/catalog</code></div>
    </div>
    <div class="spacer"></div>
    <button id="publish" class="primary">Katalog veröffentlichen</button>
  </div>
</div>

<div class="card">
  <div class="row">
    <input id="search" placeholder="Suche nach Namen ( ~ wird ignoriert )">
    <span id="pillKids" class="pill">Kinder: —</span>
  </div>
  <div id="kidList" class="list"></div>
</div>

<div id="overlay" class="overlay">
  <div class="panel">
    <div class="row">
      <b id="detailName">—</b>
      <div class="spacer"></div>
      <button id="close">Schließen</button>
    </div>

    <hr>

    <b>Ziel</b>
    <select id="goalSelect"></select>
    <button id="setGoal" class="primary" style="margin-top:8px">Ziel setzen</button>

    <hr>

    <div class="row">
      <b>Stempel</b>
      <span id="stampInfo" class="pill">0 / 10</span>
    </div>
    <div id="circles" class="circles"></div>
    <button id="saveStamps" class="primary" style="margin-top:10px">Stempel speichern</button>

    <hr>

    <b>Notiz (nur diese Woche)</b>
    <textarea id="note"></textarea>
    <button id="saveNote" class="primary" style="margin-top:8px">Notiz speichern</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import { getDatabase, ref, get, set, update, onValue } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";

/* Firebase */
const app = initializeApp({
  apiKey: "AIzaSyAdPN2duh89Fx5rmYlFshdf0juhYNX_7fg",
  databaseURL: "https://punkte-45c20-default-rtdb.europe-west1.firebasedatabase.app"
});
const db = getDatabase(app);

/* Pfade */
const PATH_NAMES = "kinder";
const PATH_CHILDREN = "zielkarte/v1/children";
const PATH_CATALOG = "zielkarte/v1/catalog";

/* Ziele (hardcoded) */
const GOALS = [
  {id:"A1", text:"Ich bin freundlich zu anderen."},
  {id:"A2", text:"Ich teile Dinge mit anderen."},
  {id:"B1", text:"Ich höre anderen zu."},
  {id:"C1", text:"Ich halte Regeln ein."},
  {id:"D1", text:"Ich räume meine Sachen weg."}
];
const FIRST_GOAL_ID = GOALS[0].id;

/* State */
let names = [];
let states = {};
let current = null;
let draftStamps = 0;

/* Utils */
const clamp = n => Math.max(0, Math.min(10, n));
const validName = n => n && !n.includes("~");

/* Publish catalog */
document.getElementById("publish").onclick = () =>
  set(ref(db, PATH_CATALOG), {version:1, goals:GOALS});

/* Render list (FIXED) */
function renderList(){
  const q = search.value.toLowerCase();
  kidList.innerHTML = "";

  names.filter(n=>n.toLowerCase().includes(q)).forEach(name=>{
    const st = states[name] || {};
    const goalId = st.activeGoalId || FIRST_GOAL_ID;   // 🔧 FIX
    const goal = GOALS.find(g=>g.id===goalId);
    const stamps = clamp(st.stamps||0);

    const el = document.createElement("div");
    el.className="kid";
    el.innerHTML = `
      <div>
        <div class="kidName">${name}</div>
        <div class="kidMeta">${stamps}/10 • ${goal.text}</div>
      </div>
      <div class="kidMeta">›</div>
    `;
    el.onclick=()=>openKid(name);
    kidList.appendChild(el);
  });

  pillKids.textContent = `Kinder: ${names.length}`;
}

/* Open kid */
async function openKid(name){
  current = name;
  let st = states[name];
  if(!st){
    st = {activeGoalId:FIRST_GOAL_ID,stamps:0,note:""};
    await set(ref(db,`${PATH_CHILDREN}/${name}`),st);
  }

  detailName.textContent = name;
  draftStamps = st.stamps||0;

  goalSelect.innerHTML="";
  GOALS.forEach(g=>{
    const o=document.createElement("option");
    o.value=g.id;o.textContent=g.text;
    goalSelect.appendChild(o);
  });
  goalSelect.value=st.activeGoalId||FIRST_GOAL_ID;

  renderCircles(draftStamps);
  note.value=st.note||"";
  overlay.classList.add("show");
}

/* Circles */
function renderCircles(n){
  circles.innerHTML="";
  stampInfo.textContent=`${n} / 10`;
  for(let i=1;i<=10;i++){
    const d=document.createElement("div");
    d.className="dot"+(i<=n?" on":"");
    d.onclick=()=>{draftStamps=i;renderCircles(i);}
    circles.appendChild(d);
  }
}

/* Save actions */
setGoal.onclick=async()=>{
  await update(ref(db,`${PATH_CHILDREN}/${current}`),{
    activeGoalId:goalSelect.value,stamps:0,note:""
  });
};
saveStamps.onclick=async()=>{
  await update(ref(db,`${PATH_CHILDREN}/${current}`),{stamps:draftStamps});
};
saveNote.onclick=async()=>{
  await update(ref(db,`${PATH_CHILDREN}/${current}`),{note:note.value});
};
close.onclick=()=>overlay.classList.remove("show");

/* Realtime listeners */
onValue(ref(db, PATH_NAMES), snap=>{
  names=[];
  snap.forEach(c=>validName(c.key)&&names.push(c.key));
  renderList();
});
onValue(ref(db, PATH_CHILDREN), snap=>{
  states={};
  snap.exists()&&snap.forEach(c=>states[c.key]=c.val());
  renderList();
});
</script>
</body>
</html>
